# =============================================================================
# sweep.conf — configuration for scripts/run_sweep.sh
#
# This file is *sourced* by bash (not parsed), so it needs no extra tooling and
# can't half-parse. Edit values below. Arrays = swept dimensions.
# Run name + LMCACHE_CACHE_POLICY + LMCACHE_MAX_LOCAL_CPU_SIZE are all derived
# from the same loop variables, so policy/cpu can never drift between the server
# env and the output-dir name.
# =============================================================================

# ---- SWEEP DIMENSIONS (the script loops over every policy x cpu_size) --------
# Valid policies (LMCache POLICY_MAPPING): LRU LFU FIFO MRU ARC S3FIFO WTINYLFU
POLICIES=(LRU LFU ARC)
# LMCACHE_MAX_LOCAL_CPU_SIZE values in GB (host RAM!). Add a big one for the
# "cache-everything" optimal baseline, e.g. one that holds the whole working set.
CPU_SIZES_GB=(40)

# ---- OUTPUT -----------------------------------------------------------------
# Set ENABLE_ACCESS_LOG=1 to write a cpu_access.jsonl per run (used by belady_sim.py).
# Only enable for LRU runs intended for Belady analysis; adds minor file-write overhead.
ENABLE_ACCESS_LOG=0

# Base dir: per-run subfolders (HTML/CSV) AND <run>.client.log / <run>.server.log
# go here; a master sweep_<ts>.log records the timeline.
BASE_OUTPUT_DIR="/workspace/vllm/logs/agentic_jun24"
# Optional prefix prepended to every run name (e.g. an experiment tag). Empty = none.
RUN_PREFIX=""

# ---- SERVER (vllm serve) — fixed across the sweep ---------------------------
MODEL="Qwen/Qwen2.5-7B-Instruct"
HOST="localhost"
PORT="8000"
HIP_VISIBLE_DEVICES="0"
GPU_MEM_UTIL="0.5"
MAX_MODEL_LEN="131072"
MAX_NUM_SEQS="24"
BLOCK_SIZE="16"
KV_CACHE_METRICS_SAMPLE="1.0"          # 1.0 = true GPU eviction counts (see notes)
LMCACHE_CHUNK_SIZE="256"
PROM_DIR="/tmp/lmcache_prometheus"
HF_OVERRIDES='{"rope_parameters": {"rope_type": "yarn", "factor": 4.0, "original_max_position_embeddings": 32768, "rope_theta": 1000000}}'
KV_TRANSFER_CONFIG='{"kv_connector":"LMCacheConnectorV1","kv_role":"kv_both"}'

# ---- CLIENT (trace_replay_tester.py) — fixed across the sweep ---------------
TRACE_DIR="./traces"                    # relative to the tester root
TOKENIZER="Qwen/Qwen2.5-7B-Instruct"
MAX_CONTEXT="64000"
CHUNK_SIZE="64"
MAX_CONCURRENT="24"
START_USERS="30"
MAX_USERS="50"
MAX_TRACES="64"
TEST_DURATION="3600"
TIMING_STRATEGY="think-only"
SEED="42"                               # used for --trace-seed/--prompt-seed/--seed
MAX_TTFT="1000"

# ---- ORCHESTRATION TIMEOUTS / SAFETY (seconds) ------------------------------
SERVER_START_TIMEOUT="600"   # max wait for /health to come up; else skip this run
SERVER_STOP_TIMEOUT="60"     # max wait for /health to stop responding after SIGINT
SERVER_STOP_GRACE="30"       # SIGINT grace before SIGKILL of the server group
SERVER_SETTLE="20"           # pause after shutdown so GPU/host mem fully frees
CLIENT_TIMEOUT_BUFFER="1800" # client wall-clock cap = TEST_DURATION + this buffer
POLL_INTERVAL="3"            # health poll cadence
